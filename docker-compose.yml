version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: toolkitz-backend
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - PORT=3000

  frontend:
    build:
      context: ./frontend
    container_name: toolkitz-frontend
    ports:
      - "80:80" # Akses web via http://localhost
    restart: unless-stopped
    depends_on:
      - backend